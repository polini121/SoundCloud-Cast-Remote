<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title></title>
<style>
  :root {
    --orange: #ff5500;
    --bg: #0e0e0e;
    --card: #1a1a1a;
    --line: #2a2a2a;
    --text: #f2f2f2;
    --muted: #9a9a9a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    overflow-y: auto;
    overscroll-behavior: auto;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-overflow-scrolling: touch;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    min-height: 100%;
    display: flex; flex-direction: column;
    max-width: 480px; margin: 0 auto;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  }
  header { text-align: center; margin-bottom: 16px; position: relative; }
  header h1 { font-size: 15px; color: var(--orange); margin: 0 0 4px; font-weight: 700; }
  #statusPill {
    display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: #3a1a00; color: var(--muted); margin-top: 4px;
  }
  #statusPill.ok { background: #0a4023; color: #6be3a3; }
  #statusPill.warn { background: #402a0a; color: #ffb35c; }
  #pullHint {
    position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
    font-size: 11px; color: var(--muted); padding: 4px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.06); opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  #pullHint.visible {
    opacity: 1; transform: translateX(-50%) translateY(4px);
  }

  #pairScreen { display: flex; flex-direction: column; gap: 10px; margin-top: 40px; }
  #pairScreen label { font-size: 13px; color: var(--muted); }
  #pairInput {
    font-family: ui-monospace, Menlo, monospace; font-size: 22px; text-align: center;
    letter-spacing: 2px; text-transform: uppercase;
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 14px; outline: none;
  }
  #pairInput:focus { border-color: var(--orange); }
  #connectBtn {
    background: var(--orange); color: #000; border: none; font-weight: 700;
    font-size: 15px; padding: 14px; border-radius: 10px; cursor: pointer;
  }
  #connectBtn:disabled { opacity: .5; }
  #pairError { color: #ff7a7a; font-size: 12px; min-height: 16px; text-align: center; }

  #remoteScreen { display: none; flex-direction: column; gap: 16px; }
  #remoteScreen.active { display: flex; }
  #pairScreen.hidden { display: none; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }

  #artwork {
    width: 100%; aspect-ratio: 1 / 1; border-radius: 12px; background: #222 center/cover no-repeat;
    display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px;
    margin-bottom: 12px;
  }
  #title { font-size: 16px; font-weight: 700; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #artist { font-size: 13px; color: var(--muted); text-align: center; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #seekWrap { margin-top: 14px; }
  #seekBar {
    height: 20px;
    border-radius: 999px;
    background: #2a2a2a;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    touch-action: none;
  }
  #seekFill {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, rgba(255,85,0,0.95) 0%, rgba(255,85,0,0.12) 100%);
    mix-blend-mode: screen;
    transition: width 0.18s linear;
    will-change: width;
  }
  .timeRow { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; }

  .mainControls { display: flex; align-items: center; justify-content: center; gap: 22px; margin-top: 4px; }
  .mainControls button { background: none; border: none; color: var(--text); cursor: pointer; padding: 8px; }
  #btnPlayPause {
    width: 62px; height: 62px; border-radius: 50%; background: var(--orange); color: #000;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .mainControls button svg { width: 26px; height: 26px; }
  #btnPlayPause svg { width: 26px; height: 26px; }

  .secondaryControls { display: flex; justify-content: space-between; margin-top: 4px; }
  .secondaryControls button {
    flex: 1; min-width: 0; background: rgba(255,255,255,0.03); border: none;
    color: var(--muted); cursor: pointer; padding: 10px 4px; font-size: 11px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; border-radius: 14px;
    transition: background 0.15s ease, color 0.15s ease;
    outline: none;
  }
  .secondaryControls button:hover {
    background: rgba(255,255,255,0.08);
  }
  .secondaryControls button:active {
    background: rgba(255,85,0,0.20);
  }
  .secondaryControls button.active {
    color: #ff5500;
    background: linear-gradient(180deg, rgba(255,85,0,0.28), rgba(255,85,0,0.18));
    border: 1px solid rgba(255,85,0,0.45);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .secondaryControls button.active span,
  .secondaryControls button.active svg {
    color: inherit;
    fill: currentColor;
  }
  .secondaryControls button.repeat-one {
    color: var(--orange); border-color: rgba(255,85,0,0.32); background: rgba(255,85,0,0.20);
    position: relative;
  }
  .secondaryControls button.repeat-one::after {
    content: "1";
    position: absolute;
    right: 10px;
    top: 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--orange);
  }
  .secondaryControls svg { width: 20px; height: 20px; }

  .volumeRow { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .volumeRow button {
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    width: 40px; height: 40px; border-radius: 10px; font-size: 16px; cursor: pointer;
  }

  #reconnectBtn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-size: 12px; padding: 8px; border-radius: 8px; cursor: pointer; margin-top: 4px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <span id="statusPill" class="warn">Niepołączono</span>
    <div id="pullHint">Przeciągnij w dół, aby odświeżyć</div>
  </header>

  <div id="pairScreen">
    <label for="pairInput">Wpisz kod parowania z komputera</label>
    <input id="pairInput" maxlength="12" placeholder="sc-XXXXXX" autocapitalize="characters" autocomplete="off" />
    <div id="pairError"></div>
    <button id="connectBtn">Połącz</button>
  </div>

  <div id="remoteScreen">
    <div class="card">
      <div id="artwork">brak okładki</div>
      <div id="title">—</div>
      <div id="artist">—</div>
      <div id="seekWrap">
        <div id="seekBar">
          <div id="seekFill"></div>
        </div>
        <div class="timeRow"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
      </div>
    </div>

    <div class="card">
      <div class="mainControls">
        <button id="btnPrev" title="Poprzedni">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button id="btnPlayPause" title="Play/Pauza">
          <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button id="btnNext" title="Następny">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
        </button>
      </div>

      <div class="secondaryControls">
        <button id="btnShuffle" title="Losowo">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3h4v4h-2V6.4l-4 4-1.4-1.4 4-4H17zm4 14v4h-4v-2h1.6l-4-4 1.4-1.4 4 4V17zM3 6h4l3 3-1.4 1.4L6.2 8H3zm0 12v-2h3.2l2.4-2.4L10 15l-3 3z"/></svg>
          <span>Losowo</span>
        </button>
        <button id="btnRepeat" title="Powtarzaj">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2z"/></svg>
          <span>Powtarzaj</span>
        </button>
        <button id="btnLike" title="Polub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-6.7-4.35-9.3-8.1C1.1 10.6 1.6 7.4 4.2 5.9c2.1-1.2 4.4-.6 5.8 1.1L12 9l2-2c1.4-1.7 3.7-2.3 5.8-1.1 2.6 1.5 3.1 4.7 1.5 7-2.6 3.75-9.3 8.1-9.3 8.1z"/></svg>
          <span>Lubię to</span>
        </button>
        <button id="btnMute" title="Wycisz">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9v6h4l5 5V4L9 9H5z"/></svg>
          <span>Wycisz</span>
        </button>
      </div>

      <div class="volumeRow">
        <button id="btnVolDown">–</button>
        <div style="flex:1; text-align:center; font-size: 11px; color: var(--muted);">Głośność</div>
        <button id="btnVolUp">+</button>
      </div>
    </div>

    <button id="reconnectBtn">Rozłącz / zmień kod</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function () {
  "use strict";

  const $ = (id) => document.getElementById(id);
  const pairScreen = $("pairScreen");
  const remoteScreen = $("remoteScreen");
  const statusPill = $("statusPill");
  const pairInput = $("pairInput");
  const pairError = $("pairError");
  const connectBtn = $("connectBtn");

  let peer = null;
  let conn = null;
  let lastInfo = null;
  let lastCurrent = null;
  let lastTotal = null;
  let lastInfoTimestamp = 0;
  let isPlaying = false;
  let repeatMode = 0; // 0=off, 1=repeat all, 2=repeat one
  let wasMutedForSeek = false;
  let pullStartY = null;
  let pullDistance = 0;
  let pullHint = null;
  const pullThreshold = 80;
  let connectTimer = null;
  let connectAttempts = 0;
  const MAX_CONNECT_ATTEMPTS = 3;

  // Wczytaj kod z ?id=... w URL, jeśli jest (np. z linku wygenerowanego przez rozszerzenie)
  const urlParams = new URLSearchParams(location.search);
  const prefillId = urlParams.get("id");
  const peerHost = urlParams.get("peerHost") || "0.peerjs.com";
  const requestedPort = Number(urlParams.get("peerPort"));
  const isSecureContext = window.location.protocol === "https:" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
  const peerSecureOverride = urlParams.get("peerSecure");
  const peerSecure = peerSecureOverride == null ? true : peerSecureOverride !== "false";
  const peerPort = Number.isFinite(requestedPort) ? requestedPort : 443;
  const peerPath = urlParams.get("peerPath") || "/";
  const peerOptions = { host: peerHost, port: peerPort, secure: peerSecure, path: peerPath };
  if (prefillId) pairInput.value = prefillId.toUpperCase();

  function setStatus(text, cls) {
    statusPill.textContent = text;
    statusPill.className = cls || "warn";
  }

  function showRemote(show) {
    pairScreen.classList.toggle("hidden", show);
    remoteScreen.classList.toggle("active", show);
  }

  function send(action, value) {
    if (!conn || !conn.open) return;
    conn.send({ type: "action", action, value });
  }

  function sendToggle(action, button) {
    if (!conn || !conn.open) return;
    button.classList.toggle("active");
    conn.send({ type: "action", action });
  }

  function setRepeatState(mode) {
    repeatMode = mode || 0;
    const btn = $("btnRepeat");
    btn.classList.toggle("active", repeatMode > 0);
    btn.classList.toggle("repeat-one", repeatMode === 2);
  }

  function showPullHint(show) {
    if (!pullHint) return;
    pullHint.classList.toggle("visible", show);
  }

  function updatePullHint(distance) {
    if (!pullHint) return;
    if (distance >= pullThreshold) {
      pullHint.textContent = "Puść, aby odświeżyć";
    } else {
      pullHint.textContent = "Przeciągnij w dół, aby odświeżyć";
    }
  }

  function fmtTime(value) {
    if (typeof value === "number" && !Number.isNaN(value)) {
      const minutes = Math.floor(value / 60);
      const seconds = Math.floor(value % 60);
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }
    return value || "0:00";
  }

  function parseSeconds(value) {
    if (value == null) return null;
    if (typeof value === "number" && !Number.isNaN(value)) return value;
    if (typeof value === "string") {
      const parts = value.split(":").map((part) => parseInt(part, 10));
      if (parts.some((n) => Number.isNaN(n))) return null;
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      return parts[0];
    }
    return null;
  }

  function getInterpolatedTime() {
    if (lastCurrent == null || lastTotal == null) return null;
    const elapsed = (performance.now() - lastInfoTimestamp) / 1000;
    const current = Math.min(lastTotal, lastCurrent + (isPlaying ? elapsed : 0));
    return { current, total: lastTotal };
  }

  function updateSeekDisplay() {
    const times = getInterpolatedTime();
    if (!times) return;
    $("curTime").textContent = fmtTime(times.current);
    setSeekProgress((times.current / times.total) * 100);
  }

  function setSeekProgress(percent) {
    const normalized = Math.max(0, Math.min(100, percent || 0));
    $("seekFill").style.width = normalized + "%";
  }

  function normalizeArtworkUrl(url) {
    if (!url) return url;
    return url
      .replace(/-t\d+x\d+(\.[a-z]+)$/i, "-t500x500$1")
      .replace(/-(large|small|badge|crop|tiny)(\.[a-z]+)$/i, "-t500x500$2");
  }

  function renderInfo(info) {
    if (!info) return;
    const title = typeof info.title === "string" && info.title.trim() ? info.title : lastInfo?.title || "—";
    const artist = typeof info.artist === "string" && info.artist.trim() ? info.artist : lastInfo?.artist || "—";
    lastInfo = { ...lastInfo, ...info, title, artist };

    $("title").textContent = title;
    $("artist").textContent = artist;

    const art = $("artwork");
    if (info.artwork) {
      art.style.backgroundImage = `url("${normalizeArtworkUrl(info.artwork)}")`;
      art.textContent = "";
    } else if (!lastInfo.artwork) {
      art.style.backgroundImage = "none";
      art.textContent = "brak okładki";
    }

    const current = parseSeconds(info.current);
    const total = parseSeconds(info.total);
    if (current != null) lastCurrent = current;
    if (total != null) lastTotal = total;
    lastInfoTimestamp = performance.now();
    isPlaying = typeof info.playing === "boolean" ? info.playing : isPlaying;

    if (lastTotal != null && lastTotal > 0) {
      $("totTime").textContent = fmtTime(lastTotal);
    }

    if (lastCurrent != null && lastTotal != null && lastTotal > 0) {
      updateSeekDisplay();
    } else if (lastCurrent != null) {
      $("curTime").textContent = fmtTime(lastCurrent);
    }

    const iconPlay = $("iconPlay");
    const iconPause = $("iconPause");
    if (isPlaying) {
      iconPlay.style.display = "none";
      iconPause.style.display = "";
    } else {
      iconPlay.style.display = "";
      iconPause.style.display = "none";
    }

    $("btnLike").classList.toggle("active", !!info.liked);
    $("btnShuffle").classList.toggle("active", !!info.shuffled);
    const mode = typeof info.repeatMode === "number"
      ? info.repeatMode
      : (!!info.repeating ? 1 : 0);
    setRepeatState(mode);
    $("btnMute").classList.toggle("active", !!info.muted);
  }

  function clearConnectTimer() {
    if (connectTimer) {
      clearTimeout(connectTimer);
      connectTimer = null;
    }
  }

  function formatPeerError(err) {
    const message = String(err?.message || err?.type || err || "");
    const text = message.toLowerCase();
    if (err?.type === "peer-unavailable" || message.includes("does not exist") || text.includes("could not establish connection")) {
      return "Nie znaleziono komputera o tym kodzie. Upewnij się, że aplikacja lub rozszerzenie na komputerze jest otwarte i ma aktywny kod parowania. Jeśli używasz własnego serwera PeerJS, dodaj parametry URL: ?id=...&peerHost=...&peerPort=...&peerPath=...";
    }
    if (text.includes("server error") || text.includes("server-error") || text.includes("network")) {
      return "Serwer PeerJS nie odpowiedział. Jeśli otwierasz stronę lokalnie z pliku, uruchom ją przez lokalny serwer HTTP/HTTPS albo podaj własny host PeerJS w URL. Przykład: ?id=...&peerHost=twoj-host&peerPort=443&peerPath=/&peerSecure=true";
    }
    return "Błąd połączenia: " + message;
  }

  function isRetryableConnectionError(err) {
    const message = String(err?.message || err?.type || err || "");
    const text = message.toLowerCase();
    return err?.type === "peer-unavailable"
      || message.includes("does not exist")
      || text.includes("could not establish connection")
      || text.includes("server error")
      || text.includes("network");
  }

  function connectTo(id) {
    const normalizedId = String(id || "").trim().toLowerCase();
    pullStartY = null;
    pullDistance = 0;
    showPullHint(false);
    pairError.textContent = "";
    connectBtn.disabled = true;
    setStatus("Łączenie…", "warn");
    clearConnectTimer();

    const attemptConnect = () => {
      connectAttempts += 1;
      if (conn) { try { conn.close(); } catch (e) {} }
      if (peer) { try { peer.destroy(); } catch (e) {} }
      conn = null;

      connectTimer = window.setTimeout(() => {
        if (conn && !conn.open) {
          if (connectAttempts < MAX_CONNECT_ATTEMPTS) {
            pairError.textContent = "Czekam na komputer…";
            setStatus("Ponawiam połączenie…", "warn");
            window.setTimeout(attemptConnect, 900);
          } else {
            pairError.textContent = "Połączenie nie zostało nawiązane w czasie. Sprawdź, czy komputer jest online i czy kod jest aktualny.";
            connectBtn.disabled = false;
            setStatus("Błąd", "warn");
          }
        }
      }, 10000);

      // eslint-disable-next-line no-undef
      peer = new Peer(undefined, peerOptions); // losowy, anonimowy peer po stronie telefonu
      peer.on("open", () => {
        conn = peer.connect(normalizedId, { reliable: true });

        conn.on("open", () => {
          clearConnectTimer();
          connectAttempts = 0;
          setStatus("Podłączono ✓", "ok");
          connectBtn.disabled = false;
          showRemote(true);
          conn.send({ type: "get" });
        });

        conn.on("data", (data) => {
          if (!data || !data.type) return;
          if (data.type === "hello" || data.type === "state") {
            renderInfo(data.info);
            if (data.error) setStatus(data.error, "warn");
          }
        });

        conn.on("close", () => {
          clearConnectTimer();
          connectAttempts = 0;
          setStatus("Rozłączono", "warn");
          showRemote(false);
          connectBtn.disabled = false;
        });

        conn.on("error", (err) => {
          if (isRetryableConnectionError(err) && connectAttempts < MAX_CONNECT_ATTEMPTS) {
            clearConnectTimer();
            pairError.textContent = "Czekam na komputer…";
            setStatus("Ponawiam połączenie…", "warn");
            window.setTimeout(attemptConnect, 900);
            return;
          }
          clearConnectTimer();
          pairError.textContent = formatPeerError(err);
          connectBtn.disabled = false;
          setStatus("Błąd", "warn");
        });
      });

      peer.on("error", (err) => {
        if (isRetryableConnectionError(err) && connectAttempts < MAX_CONNECT_ATTEMPTS) {
          clearConnectTimer();
          pairError.textContent = "Czekam na komputer…";
          setStatus("Ponawiam połączenie…", "warn");
          window.setTimeout(attemptConnect, 900);
          return;
        }
        clearConnectTimer();
        connectBtn.disabled = false;
        pairError.textContent = formatPeerError(err);
        setStatus("Błąd", "warn");
      });
    };

    attemptConnect();
  }

  connectBtn.addEventListener("click", () => {
    const id = pairInput.value.trim().toLowerCase();
    if (!id) {
      pairError.textContent = "Podaj kod parowania.";
      return;
    }
    pairInput.value = id.toUpperCase();
    connectTo(id);
  });

  pullHint = $("pullHint");
  document.addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    if (touch.clientY > 40) return;
    if (e.target.closest("#seekBar")) return;
    pullStartY = touch.clientY;
    pullDistance = 0;
    updatePullHint(0);
    showPullHint(true);
  }, { passive: true });

  document.addEventListener("touchmove", (e) => {
    if (pullStartY == null) return;
    const touch = e.touches[0];
    pullDistance = Math.max(0, touch.clientY - pullStartY);
    updatePullHint(pullDistance);
    if (pullDistance > 0) e.preventDefault();
  }, { passive: false });

  document.addEventListener("touchend", () => {
    if (pullStartY == null) return;
    if (pullDistance >= pullThreshold && conn && conn.open) {
      setStatus("Odświeżanie…", "warn");
      conn.send({ type: "get" });
    }
    pullStartY = null;
    pullDistance = 0;
    showPullHint(false);
  });

  pairInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") connectBtn.click();
  });

  $("btnPrev").addEventListener("click", () => send("prev"));
  $("btnNext").addEventListener("click", () => send("next"));
  $("btnPlayPause").addEventListener("click", () => send("playPause"));
  $("btnShuffle").addEventListener("click", () => sendToggle("shuffle", $("btnShuffle")));
  $("btnRepeat").addEventListener("click", () => sendToggle("repeat", $("btnRepeat")));
  $("btnLike").addEventListener("click", () => sendToggle("like", $("btnLike")));
  $("btnMute").addEventListener("click", () => sendToggle("mute", $("btnMute")));
  $("btnVolUp").addEventListener("click", () => send("volumeUp"));
  $("btnVolDown").addEventListener("click", () => send("volumeDown"));

  let isSeeking = false;
  let seekRect = null;
  const SEEK_MAX_PERCENT = 98.5;

  function getEventClientX(e) {
    if (e.touches && e.touches.length) {
      return e.touches[0].clientX;
    }
    return e.clientX;
  }

  function getSeekPercent(clientX) {
    if (!seekRect) return 0;
    const rawPercent = ((clientX - seekRect.left) / seekRect.width) * 100;
    return Math.max(0, Math.min(SEEK_MAX_PERCENT, rawPercent));
  }

  function sendSeek(percent) {
    if (!conn || !conn.open) return;
    conn.send({ type: "action", action: "seek", value: percent });
  }

  function startSeek(e) {
    if (isSeeking || !conn || !conn.open) return;
    if (typeof e.preventDefault === "function") e.preventDefault();
    if ($("btnMute").classList.contains("active")) {
      wasMutedForSeek = false;
    } else {
      wasMutedForSeek = true;
      send("mute");
      $("btnMute").classList.add("active");
    }
    isSeeking = true;
    seekRect = $("seekBar").getBoundingClientRect();
    if (e.pointerId && e.currentTarget && e.currentTarget.setPointerCapture) {
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (error) {}
    }
    const clientX = getEventClientX(e);
    const percent = getSeekPercent(clientX);
    sendSeek(percent);
  }

  function moveSeek(e) {
    if (!isSeeking || !conn || !conn.open) return;
    if (typeof e.preventDefault === "function") e.preventDefault();
    const clientX = getEventClientX(e);
    const percent = getSeekPercent(clientX);
    sendSeek(percent);
  }

  function endSeek(e) {
    if (!isSeeking) return;
    isSeeking = false;
    seekRect = null;
    if (wasMutedForSeek) {
      send("mute");
      $("btnMute").classList.remove("active");
      wasMutedForSeek = false;
    }
    if (e && e.pointerId && e.currentTarget && e.currentTarget.releasePointerCapture) {
      try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (error) {}
    }
  }

  $("seekBar").addEventListener("pointerdown", startSeek);
  $("seekBar").addEventListener("touchstart", startSeek, { passive: false });
  window.addEventListener("pointermove", moveSeek);
  window.addEventListener("touchmove", moveSeek, { passive: false });
  window.addEventListener("pointerup", endSeek);
  window.addEventListener("pointercancel", endSeek);
  window.addEventListener("touchend", endSeek);
  window.addEventListener("touchcancel", endSeek);

  $("seekBar").addEventListener("click", (e) => {
    if (isSeeking) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const percent = ((e.clientX - rect.left) / rect.width) * 100;
    sendSeek(Math.max(0, Math.min(SEEK_MAX_PERCENT, percent)));
  });

  $("reconnectBtn").addEventListener("click", () => {
    clearConnectTimer();
    if (conn) { try { conn.close(); } catch (e) {} }
    if (peer) { try { peer.destroy(); } catch (e) {} }
    conn = null;
    showRemote(false);
    setStatus("Niepołączono", "warn");
  });

  // Odśwież stan co 1s jako fallback (na wypadek zgubionej wiadomości)
  setInterval(() => {
    if (conn && conn.open) conn.send({ type: "get" });
  }, 1000);

  // Animuj pasek odtwarzania na żywo między danymi z komputera
  setInterval(updateSeekDisplay, 100);

  if (prefillId) {
    // Autopołączenie, jeśli kod przyszedł z linku
    setTimeout(() => connectBtn.click(), 300);
  }
})();
</script>
</body>
</html>
